[tox]
requires = tox>=3,tox-uv
envlist = py{310,311,312,313,314}, pypy{310,311}

[testenv]
description = run unit tests
extras = dev
commands =
    pytest tests

[testenv:format]
description = run formatters
extras = dev
commands =
    black src tests benchmark

[testenv:lint]
description = run linters
extras = dev
commands =
    validate-pyproject pyproject.toml
    black --check --diff src tests benchmark
    pylint src benchmark
    mypy src tests benchmark
